<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATON Converter - Quick Test</title>
    <script src="aton.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 10px;
            font-family: monospace;
            font-size: 13px;
        }
        .options {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .options label {
            display: block;
            margin: 10px 0;
        }
        button {
            background: #000;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #333;
        }
        .stats {
            margin-top: 10px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🧪 ATON Converter Test - Schema Configuration</h1>
    
    <div class="options">
        <h3>Conversion Options</h3>
        <label>
            <input type="checkbox" id="includeSchema" checked onchange="updateOptions()">
            <strong>Include Schema</strong> - Add @schema[...] header
        </label>
        <label>
            <input type="checkbox" id="includeDefaults" checked onchange="updateOptions()">
            <strong>Include Defaults</strong> - Add @defaults[...] header
        </label>
        <label>
            <input type="checkbox" id="optimizeData" checked onchange="updateOptions()">
            <strong>Optimize Data</strong> - Omit default values
        </label>
    </div>

    <button onclick="convert()" style="width: 100%; margin-bottom: 20px;">Convert to ATON →</button>

    <div class="container">
        <div>
            <h3>Input (JSON)</h3>
            <textarea id="inputJson">{
  "users": [
    {"id": 1, "name": "John", "role": "admin", "status": "active"},
    {"id": 2, "name": "Jane", "role": "user", "status": "active"},
    {"id": 3, "name": "Bob", "role": "user", "status": "active"}
  ]
}</textarea>
            <div class="stats">
                <strong>Tokens:</strong> <span id="inputTokens">0</span>
            </div>
        </div>
        <div>
            <h3>Output (ATON)</h3>
            <textarea id="outputAton" readonly></textarea>
            <div class="stats">
                <strong>Tokens:</strong> <span id="outputTokens">0</span> |
                <strong>Reduction:</strong> <span id="reduction">0%</span>
            </div>
        </div>
    </div>

    <script>
        // Initialize converter
        let converter = new ATONConverter({
            optimize: true,
            includeSchema: true,
            includeDefaults: true
        });

        function updateOptions() {
            const includeSchema = document.getElementById('includeSchema').checked;
            const includeDefaults = document.getElementById('includeDefaults').checked;
            const optimize = document.getElementById('optimizeData').checked;
            
            console.log('Updating options:', { includeSchema, includeDefaults, optimize });
            
            // Recreate converter with new options
            converter = new ATONConverter({
                optimize: optimize,
                includeSchema: includeSchema,
                includeDefaults: includeDefaults
            });
            
            // Auto-convert if there's input
            const input = document.getElementById('inputJson').value.trim();
            if (input) {
                convert();
            }
        }

        function convert() {
            const input = document.getElementById('inputJson').value;
            
            try {
                const aton = converter.jsonToAton(input);
                document.getElementById('outputAton').value = aton;
                
                // Calculate tokens
                const inputTokens = converter.countTokens(input);
                const outputTokens = converter.countTokens(aton);
                const reduction = Math.round((1 - outputTokens / inputTokens) * 100);
                
                document.getElementById('inputTokens').textContent = inputTokens;
                document.getElementById('outputTokens').textContent = outputTokens;
                document.getElementById('reduction').textContent = reduction + '%';
                
                console.log('Conversion successful!');
                console.log('Input tokens:', inputTokens);
                console.log('Output tokens:', outputTokens);
                console.log('Reduction:', reduction + '%');
                
            } catch (error) {
                console.error('Conversion error:', error);
                document.getElementById('outputAton').value = 'Error: ' + error.message;
            }
        }

        // Auto-convert on load
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Page loaded, running initial conversion...');
            convert();
        });
    </script>
</body>
</html>
